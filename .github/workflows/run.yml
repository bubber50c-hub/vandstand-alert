name: Run water level check

permissions:
  contents: write
  
on:
  schedule:
    - cron: "*/15 * * * *"  # hver 15 min
  workflow_dispatch:       # gør at du kan teste manuelt

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Run script
        run: python vandstand.py
        env:
          API_KEY: ${{ secrets.API_KEY }}
          EMAIL: ${{ secrets.EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
          RECEIVER: ${{ secrets.RECEIVER }}
